name: Rappels de cours (pinger)

# Déclenche l'envoi des rappels e-mail (élèves + enseignants) avant chaque séance.
# Le plan Vercel Hobby interdit les crons infra-journaliers : on appelle donc
# l'endpoint /api/reminders depuis GitHub Actions, gratuitement.
#
# ⚠️ Prérequis (à faire UNE fois) : définir le secret de dépôt CRON_SECRET avec la
#    MÊME valeur que la variable CRON_SECRET sur Vercel :
#      gh secret set CRON_SECRET
#    (ou : dépôt → Settings → Secrets and variables → Actions → New repository secret)
#
# Notes :
#  - GitHub planifie les crons « au mieux » : un retard de quelques minutes est normal.
#    La fenêtre de rappel (REMINDER_LEAD_MIN, 60 min par défaut) absorbe ce retard —
#    tant que la séance n'a pas commencé, le rappel part au passage suivant.
#  - GitHub suspend les workflows planifiés après 60 jours SANS activité sur le dépôt.
#  - Déclenchement manuel possible via l'onglet Actions (bouton « Run workflow »).

on:
  schedule:
    - cron: '*/15 * * * *'   # toutes les 15 minutes (minimum GitHub : 5 min)
  workflow_dispatch: {}       # bouton de déclenchement manuel

permissions:
  contents: read

concurrency:
  group: reminders-ping
  cancel-in-progress: false

env:
  ENDPOINT: https://kodingvillageschool.com/api/reminders

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Appeler /api/reminders
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Le secret CRON_SECRET n'est pas défini dans le dépôt (Settings → Secrets → Actions)."
            exit 1
          fi
          # -sS : silencieux mais montre les erreurs ; le secret passe par un en-tête, jamais loggé.
          code=$(curl -sS -o response.json -w '%{http_code}' \
            -X POST "$ENDPOINT" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP $code"
          echo "Réponse :"
          cat response.json || true
          echo
          if [ "$code" = "401" ]; then
            echo "::error::401 — le secret CRON_SECRET du dépôt ne correspond pas à celui de Vercel."
            exit 1
          fi
          if [ "$code" != "200" ]; then
            echo "::error::Ping échoué (HTTP $code)."
            exit 1
          fi
          echo "::notice::Rappels traités avec succès."
